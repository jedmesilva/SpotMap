kind = "mobile"
previewPath = "/"
title = "SpotMap"
version = "1.0.0"
id = "artifacts/spotmap"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 25658
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/spotmap run dev"

[services.env]
PORT = "25658"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/spotmap", "run", "build"]
run = ["pnpm", "--filter", "@workspace/spotmap", "run", "serve"]
